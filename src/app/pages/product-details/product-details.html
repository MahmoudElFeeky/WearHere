@if (product) {
  <div class="details-container container">
    <a routerLink="/" class="back-link">← Back to Products</a>
    <!-- product card -->
    <div class="product-grid">
      <div class="image-gallery">
        <img [src]="selectedImage" [alt]="product.title" class="main-image">
        <!-- images thumbnails -->
        <div class="thumbnails">
          @for (img of product.images; track $index) {
            <img [src]="img" [alt]="product.title" class="thumb-img" [class.active]="selectedImage === img" (click)="changeImage(img)">
          }
        </div>
      </div>
      <!-- info -->
      <div class="product-info">
        <span class="category-badge">{{ product.category.name }}</span>
        <h1 class="title">{{ product.title }}</h1>
        <p class="description">{{ product.description }}</p>
        <div class="price">${{ product.price }}</div>
        <button class="add-btn" (click)="addToCart()">Add to Cart 🛒</button>
      </div>
    </div>
  </div>
} @else {
  <div class="loading-state container">
    <h2>Loading product details...</h2>
  </div>
}
