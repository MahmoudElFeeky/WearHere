<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Image</th>
      <th>Title</th>
      <th>Price</th>
      <th>Category</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    @for (product of products; track product.id) {
      <tr>
        <td>{{ product.id }}</td>
        <td><img [src]="product.images[0]" class="thumb"></td>
        <td>{{ product.title }}</td>
        <td>${{ product.price }}</td>
        <td>{{ product.category.name }}</td>
        <td class="actions">
          <button class="edit-btn" (click)="onEdit.emit(product)">Edit</button>
          <button class="delete-btn" (click)="onDelete.emit(product.id)">✕</button>
        </td>
      </tr>
    }
  </tbody>
</table>
